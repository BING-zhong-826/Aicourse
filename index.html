<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>诗景共生·文脉相承 | 岳阳楼与古典诗歌深度研习</title>
    <!-- 第三方库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/particles.css">
</head>
<body>

<!-- 启动页 -->
<div id="splashScreen" class="splash-screen">
    <div class="splash-content">
        <h1 class="splash-title">诗景共生 · 文脉相承</h1>
        <p class="splash-subtitle">以杜甫《登岳阳楼》为例 — 古典诗歌与文学景观的双向互动</p>
        <p class="splash-click">▼ 点击任意位置进入 ▼</p>
    </div>
</div>

<!-- 主界面（初始隐藏） -->
<div id="mainApp" style="display: none;">
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">诗景共生 · 文脉相承</h1>
            <p class="hero-subtitle">以杜甫《登岳阳楼》为例 — 古典诗歌与文学景观的双向互动</p>
        </div>
    </header>

    <!-- 学习进度徽章 -->
    <div class="progress-badge" id="progressBadges">
        <div class="badge" id="badgeMap">🗺️ 地图未探</div>
        <div class="badge" id="badgeTimeline">📜 未阅文脉</div>
        <div class="badge" id="badgeQuiz">✍️ 测验未通</div>
    </div>

    <!-- 功能卡片菜单 -->
    <div class="cards-menu" id="cardsMenu">
        <div class="card" data-module="spatial">
            <div class="card-icon">🏔️</div>
            <h2>空间定位</h2>
            <p>诗从景来 · 地理坐标中的文学震撼</p>
        </div>
        <div class="card" data-module="timeline">
            <div class="card-icon">📜</div>
            <h2>时间轴叙事</h2>
            <p>文脉相承 · 叠加效应千年流转</p>
        </div>
        <div class="card" data-module="quiz">
            <div class="card-icon">✍️</div>
            <h2>课后测试</h2>
            <p>深度研习 · 基础通关到拓展挑战</p>
        </div>
    </div>

    <!-- 模块容器：每次只显示一个 -->
    <div id="moduleContainer"></div>

    <footer>
        <p>© 2026 诗景共生，文脉相承项目组 · 参考文献：曾大兴《文学地理学概论》 尤侗《天下名山游记序》</p>
    </footer>
</div>

<canvas id="particles-canvas"></canvas>

<script src="js/utils.js"></script>
<script src="js/particles.js"></script>
<script src="js/map.js"></script>
<script src="js/timeline.js"></script>
<script src="js/fillQuiz.js"></script>
<script src="js/matchQuiz.js"></script>
<script src="js/choiceQuiz.js"></script>
<script src="js/audioRecite.js"></script>
<script src="js/imageMemory.js"></script>
<script src="js/progress.js"></script>
<script src="js/main.js"></script>
</body>
</html>
